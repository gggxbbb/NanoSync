name: nano_sync
description: A Flutter-based Windows desktop file synchronization tool for local folders to SMB/WebDAV servers.
version: 1.0.0+1
environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Framework
  fluent_ui: ^4.15.0
  system_theme: ^3.0.0
  fluentui_system_icons: ^1.1.223

  # File System
  file_picker: ^8.0.0+1
  path_provider: ^2.1.5
  path: ^1.9.0

  # File Watching
  watcher: ^1.1.1

  # Network Protocols - WebDAV
  webdav_client_plus: ^1.0.2

  # Database
  sqflite_common_ffi: ^2.3.3+1
  sqflite: ^2.4.1

  # Storage & Preferences
  shared_preferences: ^2.3.2

  # Crypto & Checksum
  crypto: ^3.0.5

  # Archive
  archive: ^3.6.1

  # Date & Time
  intl: ^0.20.2

  # State Management
  provider: ^6.1.2

  # System Tray
  system_tray: ^2.0.3

  # Window Management
  window_manager: ^0.4.3
  flutter_acrylic: ^1.1.4

  # Windows Integration
  win32: ^5.5.4
  ffi: ^2.1.3

  # Utilities
  uuid: ^3.0.7
  logging: ^1.2.0
  rxdart: ^0.28.0
  dio: ^5.4.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
